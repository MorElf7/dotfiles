# Get editor completions based on the config schemastar
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 10000
format = """  
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_commit
$character"""

right_format = """
$docker_context\
$package\
$c\
$cmake\
$dotnet\
$golang\
$java\
$gradle\
$lua\
$nodejs\
$python
"""

# Themes

# Specific modules

[cmd_duration]
format = '[$duration]($style) '

[package]
